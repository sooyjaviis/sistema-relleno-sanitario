<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - REGIONAL CCT</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="body-login">

    <div class="login-card">
        <h1>Control de Báscula</h1>
        <p>Ingresa tus credenciales de operador</p>
        
        <div id="mensajeError" class="error-msg"></div>

        <form id="formLogin" style="text-align: left;">
            <div class="input-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" required placeholder="Ej. admin" autocomplete="username">
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primario" style="margin-top: 10px;">Iniciar Sesión</button>
        </form>
    </div>

    <script>
       document.getElementById('formLogin').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = this.querySelector('button');
    const msjError = document.getElementById('mensajeError');
    
    btn.textContent = 'Verificando...';
    btn.disabled = true;
    msjError.style.display = 'none';

    let formData = new FormData();
    formData.append('usuario', document.getElementById('usuario').value);
    formData.append('password', document.getElementById('password').value);

    fetch('login.php', { method: 'POST', body: formData })
    .then(function(respuesta) {
        return respuesta.json(); 
    })
    .then(function(datos) {
        if (datos.estado === 'exito') {
            window.location.href = 'index.html'; 
        } else {
            msjError.textContent = datos.mensaje;
            msjError.style.display = 'block';
            btn.textContent = 'Iniciar Sesión';
            btn.disabled = false;
        }
    }).catch(function(err) {
        msjError.textContent = "Error de servidor.";
        msjError.style.display = 'block';
        btn.textContent = 'Iniciar Sesión';
        btn.disabled = false;
    });
});
    </script>
</body>
</html>
