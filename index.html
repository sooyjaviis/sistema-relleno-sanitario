<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>REGIONAL CCT</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="contenedor">
        <header>
            <h1>REGIONAL CCT- Relleno Sanitario</h1>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link activo">Operación Actual</a>
                <a href="historial.html" class="nav-link">Historial de Salidas</a>
                <a href="cerrarsesion.php" class="nav-link btn-salir">Cerrar Sesión</a>
            </nav>
        </header>
        <main class="grid-principal">
            <section class="panel-formulario">
                <h2>Nuevo Registro</h2>
                <form id="formEntrada">
                    <div class="input-group">
                        <label>TIPO CAMIONETA</label>
                        <input type="text" id="tipo_camioneta" required style="text-transform: uppercase;">
                    </div>
                    <div class="input-group">
                        <label>NO. PLACA</label>
                        <input type="text" id="no_placa" required style="text-transform: uppercase;">
                    </div>
                    <div class="input-group">
                        <label>PESO (T)</label>
                        <input type="number" id="peso" step="0.01" required>
                    </div>
                    <div class="input-group">
                        <label>PAGO TOTAL</label>
                        <input type="text" id="pago_vista" readonly>
                    </div>
                    <button type="submit" class="btn-primario">GUARDAR</button>
                </form>
            </section>
            <section class="panel-tabla">
                <h2>Vehículos en Báscula</h2>
                <table id="tablaRegistros">
                    <thead>
                        <tr><th>TIPO</th><th>PLACA</th><th>PESO</th><th>PAGO</th><th>ACCIÓN</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
